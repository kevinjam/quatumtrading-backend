server {
    listen 80;
    listen [::]:80;
    server_name api.quatumtrading.com;

    # Certbot will add the HTTPS server block; keep HTTP for ACME + redirect
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.quatumtrading.com;

    # These two lines are filled/managed by certbot — leave as placeholders
    # until you run: sudo certbot --nginx -d api.quatumtrading.com
    # ssl_certificate /etc/letsencrypt/live/api.quatumtrading.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.quatumtrading.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
